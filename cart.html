<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Cart - Prince's Flower</title>
  <link rel="stylesheet" href="flower.css">
</head>
<body>
  <nav>
    <h2>Prince's Flower</h2>
    <a href="flowers.html">Back to Shop</a>
  </nav>
  
  <h1 style="text-align:center; margin:30px 0;">Your Cart</h1>
  
  <div style="max-width:800px; margin:0 auto; padding:20px;">
    <ul id="cart-list" style="list-style:none; padding:0;"></ul>
    
    <p id="total" style="font-size:24px; font-weight:bold; text-align:right; margin:30px 0;">
      Total: ₹0
    </p>
    
    <button onclick="clearCart()" style="display:block; margin:0 auto; padding:15px 40px; background:#D05678; color:white; border:none; border-radius:10px; font-size:18px; cursor:pointer;">
      Clear Cart
    </button>
  </div>
  
  <script>
    function loadCart() {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let list = document.getElementById("cart-list");
      let total = 0;
      
      list.innerHTML = "";
      if (cart.length === 0) {
        list.innerHTML = "<li style='text-align:center; color:grey; font-size:18px;'>Your cart is empty. Add some malas!</li>";
      } else {
        cart.forEach((item, index) => {
          let li = document.createElement("li");
          li.style = "display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #eee;";
          li.innerHTML = `
            ${item.name} - ${item.price}
            <button onclick="removeItem(${index})" style="background:red; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">
              Remove
            </button>
          `;
          list.appendChild(li);
          
          total += parseInt(item.price.replace(/[^0-9]/g, ''));
        });
      }
      
      document.getElementById("total").textContent = "Total: ₹" + total;
    }
    
    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
    }
    
    function clearCart() {
      localStorage.removeItem("cart");
      loadCart();
    }
    
    loadCart();
  </script>
</body>
</html
